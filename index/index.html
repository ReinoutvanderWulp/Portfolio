<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welkom op reinoutvanderwulp.be!</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: whitesmoke;
            margin: 0;
            padding: 0;
            text-align: center;
            color: black;
        }

        header {
            background-color: #3498db;
            color: white;
            padding: 20px;
            font-size: 24px;
        }

        h2 {
            color: blue;
        }

        section {
            padding: 20px;
        }

        a {
            text-decoration: none;
            color: #3498db;
            font-weight: bold;
        }

        a:hover {
            color: darkblue;
        }

        .subwebsites {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .subwebsite {
            width: 45%;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease-in-out;
        }

        .subwebsite:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <h1>Welkom op reinoutvanderwulp.be!</h1>
    </header>
    <section>
        <h2>Mijn websites:</h2>
        <div class="subwebsites">
            <div class="subwebsite">
                <a href="https://reinoutvanderwulp.be/portfolio/">Portfolio</a>
            </div>
            <div class="subwebsite">
                <a href="https://www.reinoutvanderwulp.be/itc/sportfusion/">Sportfusion (opleidings opdracht)</a>
            </div>
        </div>
    </section>
</body>
</html>
